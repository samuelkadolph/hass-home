- id: alert_laundry_dryer_finished
  alias: Alert (Laundry) - Dryer Finished
  mode: single
  triggers:
  - trigger: state
    entity_id: sensor.dryer_job_state
    to: finished
  actions:
  - action: notify.default
    data: { title: Dryer, message: Lower dryer is done! 😊 }

- id: alert_laundry_lower_washer_finished
  alias: Alert (Laundry) - Lower Washer Finished
  mode: single
  triggers:
  - trigger: state
    entity_id: sensor.washer_job_state
    to: finish
  actions:
